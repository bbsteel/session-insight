<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SessionInsight</title>
    <!-- Apply language before paint so the lang attribute is correct from the start. -->
    <!-- NOTE: keep in sync with frontend/src/i18n.tsx (getLocale / systemLocale). -->
    <script>
      (function () {
        try {
          var l = localStorage.getItem('si-locale')
          if (l !== 'zh-CN' && l !== 'en') l = (navigator.language || '').toLowerCase().startsWith('zh') ? 'zh-CN' : 'en'
          document.documentElement.lang = l
        } catch (e) {}
      })()
    </script>
    <!-- Apply theme before paint to avoid light/dark flash (default: light). -->
    <!-- NOTE: keep in sync with frontend/src/theme.ts (getThemePreference + resolveIsDark). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('recap-theme') || localStorage.getItem('session-insight-theme') || 'light'
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
          else document.documentElement.classList.remove('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
