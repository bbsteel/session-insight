name: Release
run-name: Release ${{ inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to build or republish
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify release dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify Codex ACP adapter version
        run: bash scripts/verify-codex-acp-version.sh

      - name: Test model discovery contracts
        run: go test -count=1 ./internal/llm

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-24.04
            goos: linux
            goarch: amd64
          - target: linux-arm64
            os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - target: darwin-amd64
            os: macos-15-intel
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            os: macos-15
            goos: darwin
            goarch: arm64
          - target: windows-amd64
            os: windows-2022
            goos: windows
            goarch: amd64

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify Windows C compiler
        if: runner.os == 'Windows'
        run: gcc --version

      - name: Install musl toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build and package Linux archive
        if: runner.os == 'Linux'
        shell: bash
        env:
          CGO_ENABLED: "1"
          CC: musl-gcc
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TARGET: ${{ matrix.target }}
        run: |
          version="${RELEASE_TAG#v}"
          package="session-insight-${version}-${TARGET}"
          package_dir="dist/${package}"
          mkdir -p "${package_dir}"
          go build -trimpath \
            -tags "sqlite_fts5 netgo osusergo" \
            -ldflags="-s -w -X main.version=${RELEASE_TAG} -linkmode external -extldflags '-static'" \
            -o "${package_dir}/session-insight" .
          cp README.md README_ZH.md LICENSE "${package_dir}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - name: Build and package macOS archive
        if: runner.os == 'macOS'
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TARGET: ${{ matrix.target }}
        run: |
          version="${RELEASE_TAG#v}"
          package="session-insight-${version}-${TARGET}"
          package_dir="dist/${package}"
          mkdir -p "${package_dir}"
          go build -trimpath -tags sqlite_fts5 -ldflags="-s -w -X main.version=${RELEASE_TAG}" -o "${package_dir}/session-insight" .
          cp README.md README_ZH.md LICENSE "${package_dir}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - name: Build and package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TARGET: ${{ matrix.target }}
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          $package = "session-insight-$version-$env:TARGET"
          $packageDir = Join-Path dist $package
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          go build -trimpath -tags sqlite_fts5 -ldflags="-s -w -X main.version=$env:RELEASE_TAG" -o "$packageDir/session-insight.exe" .
          Copy-Item README.md, README_ZH.md, LICENSE -Destination $packageDir
          Compress-Archive -Path $packageDir -DestinationPath "dist/$package.zip"

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download platform archives
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: dist
        run: sha256sum session-insight-* > checksums.txt

      # Preferred path: local "release" skill already created the GitHub Release
      # with agent-authored notes. This job then only uploads binaries.
      # Fallback: if the Release is missing (raw tag push), attach a
      # deterministic feat/fix-grouped commit list — never --generate-notes.
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
            exit 0
          fi

          prev="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)"
          notes="$(mktemp)"
          {
            echo "## What's Changed"
            echo
            if [ -n "${prev}" ]; then
              range="${prev}..${RELEASE_TAG}"
            else
              range="${RELEASE_TAG}"
            fi

            feats="$(git log "${range}" --pretty=format:'%s' --no-merges | grep -E '^[Ff]eat(\(|:)' || true)"
            fixes="$(git log "${range}" --pretty=format:'%s' --no-merges | grep -E '^[Ff]ix(\(|:)|^bugfix(\(|:)' || true)"
            others="$(git log "${range}" --pretty=format:'%s' --no-merges | grep -Ev '^[Ff]eat(\(|:)|^([Ff]ix|bugfix)(\(|:)' || true)"

            if [ -n "${feats}" ]; then
              echo "### Features"
              echo
              printf '%s\n' "${feats}" | sed 's/^/- /'
              echo
            fi
            if [ -n "${fixes}" ]; then
              echo "### Bug Fixes"
              echo
              printf '%s\n' "${fixes}" | sed 's/^/- /'
              echo
            fi
            if [ -n "${others}" ]; then
              echo "### Other"
              echo
              printf '%s\n' "${others}" | sed 's/^/- /'
              echo
            fi

            if [ -n "${prev}" ]; then
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${prev}...${RELEASE_TAG}"
            else
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}"
            fi
            echo
            echo "_Notes were auto-grouped from commits because no pre-created Release was found. Prefer the local \`release\` skill for Highlights-quality notes._"
          } > "${notes}"

          gh release create "${RELEASE_TAG}" dist/* \
            --verify-tag \
            --notes-file "${notes}" \
            --title "Session Insight ${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}"
          rm -f "${notes}"
